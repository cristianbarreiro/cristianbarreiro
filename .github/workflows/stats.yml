name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create profile folder
        run: mkdir -p profile

      - name: Generate Stats
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Languages
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=12&theme=transparent&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Check files
        run: |
          ls -lah profile
          head -5 profile/stats.svg
          head -5 profile/top-langs.svg

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile
          git commit -m "Update stats" || exit 0
          git push
